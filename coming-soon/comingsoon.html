  <style>
    :root {
      --bg: #fdfdfd;
      --text: #1a1f2b;
      --muted: #556080;
      --border: rgba(22, 32, 51, 0.25);
      --accent: #0b1e4a;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
    }

    .container {
      max-width: 720px;
      padding: 48px;
      border: 1px solid var(--border);
      border-radius: 14px;
      text-align: center;
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.8rem;
      font-weight: 600;
      margin: 0 0 20px;
    }

    p {
      font-size: 1rem;
      line-height: 1.7;
      color: var(--muted);
      margin-bottom: 32px;
    }

    a.button {
      display: inline-block;
      padding: 12px 22px;
      border-radius: 10px;
      border: 1px solid var(--accent);
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
    }

    a.button:hover {
      background: var(--accent);
      color: #ffffff;
    }

    @media (max-width: 768px) {
      .container {
        padding: 32px 24px;
      }

      h1 {
        font-size: 2.2rem;
      }
    }
  </style>
